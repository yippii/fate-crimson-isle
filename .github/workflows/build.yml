name: Build executable with Nuitka
on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Github Checkout
        uses: actions/checkout@v6

      - name: Setting Up Environment
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - run: pip install -r requirements.txt

      - name: Compile with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: fate-crimson-isle.py
          mode: app
          include-package: rich
          include-module: pygame.mixer
          enable-plugins: tk-inter
          include-data-files: '*.mp3=F4T3.mp3'
          output-file: fate-crimson-isle
          enable-console: true
          macos-app-name: "Fate: Crimson Isle"

      - name: Uploading artifact
        uses: actions/upload-artifact@v7
        with:
          name: Game Executable - ${{matrix.os}}
          path: | 
            ${{ matrix.os == 'windows-latest' && 'build\*.exe' || matrix.os == 'ubuntu-latest' && 'build/fate-crimson-isle' || matrix.os == 'macos-latest' && 'build/*.app' }}
            F4T3.mp3
